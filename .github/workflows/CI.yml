name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install nextest
      uses: taiki-e/install-action@nextest
    - name: Build
      run: cargo build --all-features --verbose
    - name: Run tests (two-pass)
      # Pass 1: --all-features (v2 acceptance tests)
      # Pass 2: no features    (v1 serde rejection tests)
      run: ./run-tests.sh
    - name: Run doc tests
      run: cargo test --doc --all-features
